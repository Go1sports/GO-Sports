<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GO SPORTS</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <style>
        body {
            background-color: #021e23;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-top: 5px;
        }

        .badge {
            background-color: rgba(0, 242, 195, 0.05);
            color: #00f2c3;
            border: 1px solid rgba(0, 242, 195, 0.15);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .title-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .title-area h1 {
            color: #00f2c3;
            font-size: 26px;
            margin: 0;
            font-weight: 800;
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #5b21b6, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .subtitle {
            color: #71878b;
            font-size: 12px;
            margin-top: 6px;
        }

        .player-box {
            background-color: #032a31;
            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 8px;
            position: relative;
            z-index: 10;
        }

        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
        }

        .quality-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            background: rgba(2, 30, 35, 0.5);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid rgba(113, 135, 139, 0.1);
        }

        .q-btn {
            background-color: rgba(3, 42, 49, 0.8);
            color: #71878b;
            border: 1px solid rgba(113, 135, 139, 0.2);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .q-btn.active {
            background-color: #ffb800;
            color: #021e23;
            border-color: #ffb800;
        }

        .player-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 0 4px;
        }

        .views-tag {
            background-color: rgba(0, 242, 195, 0.1);
            color: #00f2c3;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 50px;
            font-weight: bold;
        }

        .channel-info h2 {
            font-size: 14px;
            margin: 0;
            color: #ffffff;
        }

        /* تنسيق بانر التليجرام الاحترافي */
        .telegram-block {
            position: relative;
            z-index: 20;
            width: 100%;
        }

        .telegram-banner {
            background-color: #032a31;
            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: background-color 0.2s ease;
        }

        .telegram-banner:hover {
            background-color: #04353e;
        }

        .tg-left-side {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tg-icon-wrapper {
            width: 44px;
            height: 44px;
            background-color: #24A1DE;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tg-icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .tg-text-wrapper {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .tg-top-label {
            color: #24A1DE;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .tg-main-text {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .tg-btn-join {
            background-color: #00a3e0;
            border: none;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 163, 224, 0.3);
        }

        .categories-block {
            position: relative;
            z-index: 30;
            width: 100%;
        }

        .categories-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .categories-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background-color: transparent;
            color: #71878b;
            border: 1px solid rgba(113, 135, 139, 0.2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            background-color: #00f2c3;
            color: #021e23;
            border-color: #00f2c3;
        }

        .search-block {
            position: relative;
            z-index: 40;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background-color: rgba(3, 42, 49, 0.4);
            border: 1px solid rgba(113, 135, 139, 0.2);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            color: white;
            text-align: right;
            font-size: 13px;
            outline: none;
        }

        .channels-section {
            position: relative;
            z-index: 50;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .quality-tag {
            background-color: #ffb800;
            color: #021e23;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .section-header h3 {
            font-size: 14px;
            margin: 0;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .channel-card {
            background-color: #032a31;
            border: 1px solid rgba(113, 135, 139, 0.15);
            border-radius: 16px;
            padding: 14px;
            box-sizing: border-box;
            min-height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .fav-star {
            position: absolute;
            top: 10px;
            left: 12px;
            color: #71878b;
            font-size: 13px;
        }

        .play-button-circle {
            width: 32px;
            height: 32px;
            background-color: #00f2c3;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #021e23;
            font-size: 12px;
            margin-top: 12px;
        }

        .card-info {
            text-align: right;
            width: 100%;
        }

        .card-info span {
            font-size: 9px;
            color: #71878b;
            display: block;
        }

        .card-info p {
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

                <button onclick="filterCategory('alkass', this)" class="tab-btn">Alkass</button>

            </div>
        </div>

        <div class="search-block">
            <input type="text" id="searchBar" onkeyup="searchChannels()" placeholder="ابحث عن قناة..." class="search-input">
        </div>

        <div class="channels-section">
            <div class="section-header">

                <div style="display: flex; align-items: center; gap: 4px;">
                    <span class="quality-tag">HQ</span>
                    <h3 id="section-title">قنوات GO SPORTS</h3>

            <div id="channels-grid" class="channels-grid"></div>

            { id: 3, name: "القناة البنفسجية 3", category: "all", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=3&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=3&q=720", "480p": "https://s2.marketplace-io-none-kode-steeeee.lol/b3_480/index.m3u8?token=d2156afbc523f644d004b4eed1e8078dc1c13282-457970007951dd6badf48c6bcf298eb2-1779209290-1779198490&remote=169.224.32.214" } },
            { id: 4, name: "القناة البنفسجية 4", category: "all", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=4&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=4&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=4&q=480" } },
            { id: 5, name: "القناة البنفسجية 5", category: "all", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=5&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=5&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=5&q=480" } },
            { id: 6, name: "القناة البنفسجية 6", category: "all", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=6&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=6&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=6&q=480" } },

            // ====== قسم الكأس Alkass ======
            { id: 7, name: "قناة الكأس 1", category: "alkass", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=7&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=7&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=7&q=480" } },
            { id: 8, name: "قناة الكأس 2", category: "alkass", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=8&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=8&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=8&q=480" } },
            { id: 9, name: "قناة الكأس 3", category: "alkass", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=9&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=9&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=9&q=480" } },
            { id: 10, name: "قناة الكأس 4", category: "alkass", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=10&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=10&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=10&q=480" } },
            { id: 11, name: "قناة الكأس 5", category: "alkass", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=11&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=11&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=11&q=480" } },
            { id: 12, name: "قناة الكأس 6", category: "alkass", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=12&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=12&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=12&q=480" } },

            // ====== قسم ألوان Alwan ======
            { id: 13, name: "قناة ألوان 1", category: "alwan", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=13&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=13&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=13&q=480" } },
            { id: 14, name: "قناة ألوان 2", category: "alwan", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=14&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=14&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=14&q=480" } },
            { id: 15, name: "قناة ألوان 3", category: "alwan", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=15&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=15&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=15&q=480" } },
            { id: 16, name: "قناة ألوان 4", category: "alwan", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=16&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=16&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=16&q=480" } },
            { id: 17, name: "قناة ألوان 5", category: "alwan", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=17&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=17&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=17&q=480" } },
            { id: 18, name: "قناة ألوان 6", category: "alwan", sources: { "1080p": "https://vjs.zencdn.net/v/oceans.mp4?id=18&q=1080", "720p": "https://vjs.zencdn.net/v/oceans.mp4?id=18&q=720", "480p": "https://vjs.zencdn.net/v/oceans.mp4?id=18&q=480" } }
        ];

        let currentChannel = channels[0]; 

        const player = videojs('live-player', {
            fluid: true,
            controls: true,
            preload: 'auto'
        });

        function renderChannels(channelsToRender) {
            const gridContainer = document.getElementById('channels-grid');
            gridContainer.innerHTML = '';
            document.getElementById('channel-count').innerText = channelsToRender.length;

            channelsToRender.forEach(channel => {
                const card = document.createElement('div');
                card.className = "channel-card";
                card.onclick = function() { playChannel(channel.id); };
                card.innerHTML = `
                    <div class="fav-star">☆</div>
                    <div class="card-info">
                        <span>${channel.category.toUpperCase()}</span>
                        <p>${channel.name}</p>
                    </div>
                    <div class="play-button-circle">▶</div>
                `;
                gridContainer.appendChild(card);
            });
        }

        function playChannel(id) {
            const channel = channels.find(c => c.id === id);
            if (channel) {
                currentChannel = channel;
                document.getElementById('current-channel-title').innerText = channel.name;
                
                document.querySelectorAll('.q-btn').forEach(btn => btn.classList.remove('active'));
                const defaultBtn = Array.from(document.querySelectorAll('.q-btn')).find(btn => btn.innerText.includes('720p'));
                if(defaultBtn) defaultBtn.classList.add('active');

                loadSource(channel.sources["720p"]);
            }
        }

        function changeQuality(qualityKey, buttonElement) {
            if (!currentChannel || !currentChannel.sources[qualityKey]) return;
            
            document.querySelectorAll('.q-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const currentTime = player.currentTime();
            const isPaused = player.paused();

            loadSource(currentChannel.sources[qualityKey]);

            player.one('loadedmetadata', function() {
                player.currentTime(currentTime);
                if (!isPaused) player.play();
            });
        }

        function loadSource(url) {
            const isM3U8 = url.includes('m3u8');
            player.src({ 
                src: url, 
                type: isM3U8 ? 'application/x-mpegURL' : 'video/mp4' 
            });
            player.play().catch(e => console.log("User interaction required"));
            document.getElementById('view-count').innerText = Math.floor(Math.random() * 150) + 50;
        }

        function searchChannels() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        function filterCategory(category, buttonElement) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const sectionTitle = document.getElementById('section-title');
            if (category === 'all') {
                sectionTitle.innerText = "قنوات GO SPORTS";
            } else if (category === 'alkass') {
                sectionTitle.innerText = "قنوات Alkass";
            } else if (category === 'alwan') {
                sectionTitle.innerText = "قنوات Alwan";
            } else if (category === 'worldcup') {
                sectionTitle.innerText = "قنوات كأس العالم";
            }

            const filtered = channels.filter(c => c.category === category);
            renderChannels(filtered);
        }

        // تشغيل البث الأولي على قنوات البنفسجية
        filterCategory('all', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
