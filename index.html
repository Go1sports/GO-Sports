<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GO SPORTS</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body {
            background-color: #021e23;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-top: 5px;
        }

        .badge {
            background-color: rgba(0, 242, 195, 0.05);
            color: #00f2c3;
            border: 1px solid rgba(0, 242, 195, 0.15);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .title-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .title-area h1 {
            color: #00f2c3;
            font-size: 26px;
            margin: 0;
            font-weight: 800;
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #5b21b6, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .subtitle {
            color: #71878b;
            font-size: 12px;
            margin-top: 6px;
        }

        .welcome-box {
            background: linear-gradient(to bottom, #032a31, #021e23);
            border: 1px solid rgba(0, 242, 195, 0.15);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .welcome-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00f2c3, #00a3e0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0, 242, 195, 0.2);
        }

        .welcome-icon svg {
            width: 32px;
            height: 32px;
            fill: #021e23;
        }

        .welcome-box h3 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }

        .welcome-box p {
            margin: 0;
            font-size: 12px;
            color: #71878b;
            line-height: 1.6;
            max-width: 260px;
        }

        .welcome-status {
            font-size: 11px;
            color: #00f2c3;
            margin-top: 4px;
            font-weight: bold;
        }

        .player-box {
            background-color: #032a31;
            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 8px;
            position: relative;
            z-index: 10;
            display: none;
        }

        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        :root {
            --plyr-color-main: #00f2c3;
            --plyr-video-control-color: #ffffff;
            --plyr-video-controls-background: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.75));
        }
        
        .plyr {
            border-radius: 12px;
        }

        .player-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 4px;
        }

        .views-tag {
            background-color: rgba(0, 242, 195, 0.1);
            color: #00f2c3;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 50px;
            font-weight: bold;
        }

        .channel-info h2 {
            font-size: 14px;
            margin: 0;
            color: #ffffff;
        }

        .telegram-block {
            position: relative;
            z-index: 20;
            width: 100%;
        }

        .telegram-banner {
            background-color: #032a31;
            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: background-color 0.2s ease;
        }

        .telegram-banner:hover {
            background-color: #04353e;
        }

        .tg-left-side {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tg-icon-wrapper {
            width: 44px;
            height: 44px;
            background-color: #24A1DE;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tg-icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .tg-text-wrapper {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .tg-top-label {
            color: #24A1DE;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .tg-main-text {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .tg-btn-join {
            background-color: #00a3e0;
            border: none;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 163, 224, 0.3);
        }

        .categories-block {
            position: relative;
            z-index: 30;
            width: 100%;
        }

        .categories-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .categories-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background-color: transparent;
            color: #71878b;
            border: 1px solid rgba(113, 135, 139, 0.2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            background-color: #00f2c3;
            color: #021e23;
            border-color: #00f2c3;
        }

        .search-block {
            position: relative;
            z-index: 40;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background-color: rgba(3, 42, 49, 0.4);
            border: 1px solid rgba(113, 135, 139, 0.2);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            color: white;
            text-align: right;
            font-size: 13px;
            outline: none;
        }

        .channels-section {
            position: relative;
            z-index: 50;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .quality-tag {
            background-color: #ffb800;
            color: #021e23;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .section-header h3 {
            font-size: 14px;
            margin: 0;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .channel-card {
            background-color: #032a31;
            border: 1px solid rgba(113, 135, 139, 0.15);
            border-radius: 16px;
            padding: 14px;
            box-sizing: border-box;
            min-height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .fav-star {
            position: absolute;
            top: 10px;
            left: 12px;
            color: #71878b;
            font-size: 13px;
        }

        .play-button-circle {
            width: 32px;
            height: 32px;
            background-color: #00f2c3;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #021e23;
            font-size: 12px;
            margin-top: 12px;
        }

        .card-info {
            text-align: right;
            width: 100%;
        }

        .card-info span {
            font-size: 9px;
            color: #71878b;
            display: block;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-info p {
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="badge">بث مباشر • جودة متعددة</div>
            <div class="title-area">
                <h1>GO SPORTS</h1>
                <div class="logo-box">⚽</div>
            </div>
            <div class="subtitle">مشاهدة المباريات بسهولة على الموبايل</div>
        </div>

        <div id="welcome-box" class="welcome-box">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm1-11V7h-2v4H7v2h4v4h2v-4h4v-2h-4z"/>
                </svg>
            </div>
            <h3>اختر قناة للبدء</h3>
            <p>تصفح القنوات أدناه واضغط على أي واحدة لتبدأ المشاهدة فوراً</p>
            <span class="welcome-status">البث مباشر الآن</span>
        </div>

        <div id="player-box" class="player-box">
            <div class="video-container">
                <video id="live-player" playsinline controls></video>
            </div>

            <div class="player-details">
                <span class="views-tag">👁️ <span id="view-count">0</span> مباشر</span>
                <div class="channel-info">
                    <h2 id="current-channel-title">اسم القناة</h2>
                </div>
            </div>
        </div>

        <div class="telegram-block">
            <a href="https://t.me/SR7_RR" target="_blank" class="telegram-banner">
                <div class="tg-left-side">
                    <div class="tg-icon-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.58.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.97-.74 3.79-1.65 6.32-2.73 7.57-3.26 3.61-1.53 4.36-1.8 4.85-1.8.11 0 .35.03.5.16.13.12.17.29.18.41-.01.09 0 .22-.01.32z"/>
                        </svg>
                    </div>
                    <div class="tg-text-wrapper">
                        <span class="tg-top-label">TELEGRAM</span>
                        <p class="tg-main-text">GO SPORTS</p>
                    </div>
                </div>
                <button class="tg-btn-join">انضم</button>
            </a>
        </div>

        <div class="categories-block">
            <div class="categories-tabs" id="tabs-container">
                </div>
        </div>

        <div class="search-block">
            <input type="text" id="searchBar" onkeyup="searchChannels()" placeholder="ابحث عن قناة..." class="search-input">
        </div>

        <div class="channels-section">
            <div class="section-header">
                <span style="color:#71878b; font-size:12px;"><span id="channel-count">0</span> قنوات</span>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span class="quality-tag">HQ</span>
                    <h3 id="section-title">جاري تحميل الأقسام...</h3>
                </div>
            </div>
            
            <div id="channels-grid" class="channels-grid"></div>
        </div>

    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        // ======= إعدادات سيرفر الإكستريم الخاص بك =======
        const HOST = "http://vlc.news:9000";
        const USER = "AhmadAboHamor";
        const PASS = "Ff078Dd079Rr077";

        let allFetchedChannels = []; 
        let currentChannel = null; 
        let hls = null;

        const player = new Plyr('#live-player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
            settings: ['quality', 'speed'],
            i18n: {
                quality: 'الجودة',
                speed: 'السرعة',
                normal: 'طبيعي'
            }
        });

        player.on('enterfullscreen', () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(err => {
                    console.log("قفل التدوير يتطلب تفاعل المستخدم أو متصفح متوافق:", err);
                });
            }
        });

        player.on('exitfullscreen', () => {
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        });

        // 1. جلب الأقسام من السيرفر تلقائياً عند فتح الصفحة
        async function fetchCategories() {
            const url = `${HOST}/player_api.php?username=${USER}&password=${PASS}&action=get_live_categories`;
            try {
                const response = await fetch(url);
                const categories = await response.json();
                renderTabs(categories);
            } catch (e) {
                console.error("Error fetching categories", e);
                document.getElementById('section-title').innerText = "خطأ في الاتصال بالسيرفر";
            }
        }

        // 2. توزيع الأقسام المجلوبة في الـ Tabs التنسيقية للموقع
        function renderTabs(categories) {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat.category_name;
                btn.setAttribute('data-id', cat.category_id);
                btn.onclick = function() {
                    const buttons = document.querySelectorAll('.tab-btn');
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.getElementById('section-title').innerText = cat.category_name;
                    fetchChannels(cat.category_id);
                };
                container.appendChild(btn);
            });

            if (categories.length > 0) {
                document.getElementById('section-title').innerText = categories[0].category_name;
                fetchChannels(categories[0].category_id);
            }
        }

        // 3. جلب قنوات القسم المختار تلقائياً
        async function fetchChannels(categoryId) {
            const gridContainer = document.getElementById('channels-grid');
            gridContainer.innerHTML = '<p style="text-align:center; width:100%; color:#71878b;">جاري تحميل القنوات...</p>';
            document.getElementById('channel-count').innerText = "0";
            
            const url = `${HOST}/player_api.php?username=${USER}&password=${PASS}&action=get_live_streams&category_id=${categoryId}`;
            try {
                const response = await fetch(url);
                allFetchedChannels = await response.json();
                renderChannels(allFetchedChannels);
            } catch (e) {
                console.error("Error fetching channels", e);
                gridContainer.innerHTML = '<p style="text-align:center; width:100%; color:#ff3b3b;">فشل تحميل القنوات</p>';
            }
        }

        // 4. عرض القنوات داخل شبكة الـ Grid بالتصميم الأصلي
        function renderChannels(channelsToRender) {
            const gridContainer = document.getElementById('channels-grid');
            gridContainer.innerHTML = '';
            document.getElementById('channel-count').innerText = channelsToRender.length;

            if(channelsToRender.length === 0) {
                gridContainer.innerHTML = '<p style="text-align:center; width:100%; color:#71878b;">لا توجد قنوات في هذا القسم</p>';
                return;
            }

            channelsToRender.forEach(channel => {
                const card = document.createElement('div');
                card.className = "channel-card";
                card.onclick = function() { playChannel(channel); };
                card.innerHTML = `
                    <div class="fav-star">☆</div>
                    <div class="card-info">
                        <span>${channel.stream_type || 'LIVE'}</span>
                        <p>${channel.name}</p>
                    </div>
                    <div class="play-button-circle">▶</div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // 5. تشغيل القناة وبناء الرابط بالـ stream_id التابع لها تلقائياً من السيرفر الرئيسي
        function playChannel(channel) {
            if (channel) {
                currentChannel = channel;
                
                document.getElementById('welcome-box').style.display = 'none';
                document.getElementById('player-box').style.display = 'block';
                document.getElementById('current-channel-title').innerText = channel.name;

                let targetStreamId = channel.stream_id;
                
                if (!targetStreamId) {
                    stopAndClearPlayer();
                    return;
                }

                // جلب رابط البث المباشر المباشر من السيرفر الرئيسي مباشرة
                const streamUrl = `${HOST}/live/${USER}/${PASS}/${targetStreamId}.m3u8`;
                
                loadStream(streamUrl);
            }
        }

        function stopAndClearPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            const videoElement = document.getElementById('live-player');
            player.stop();
            videoElement.src = "";
            videoElement.load();
            document.getElementById('view-count').innerText = "0";
        }

        function loadStream(url) {
            const videoElement = document.getElementById('live-player');
            const isM3U8 = url.toLowerCase().includes('m3u8');

            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (isM3U8) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        maxMaxBufferLength: 15,
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 0,
                        enableSoftwareAES: true,
                        forceKeyFrameOnDiscontinuity: true,
                        overrideDecoderCodecTypes: true
                    });
                    
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                        const availableQualities = hls.levels.map(l => l.height);
                        availableQualities.unshift(0); 
                        
                        player.config.quality = {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (hlsQuality) => {
                                if (hlsQuality === 0) {
                                    hls.currentLevel = -1; 
                                } else {
                                    hls.currentLevel = hls.levels.findIndex(l => l.height === hlsQuality);
                                }
                            }
                        };
                    });

                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hls.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hls.destroy();
                                    if (currentChannel) {
                                        setTimeout(() => { playChannel(currentChannel); }, 1500);
                                    }
                                    break;
                            }
                        }
                    });

                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } else {
                videoElement.src = url;
            }

            player.play().catch(e => console.log("بانتظار تفاعل المستخدم لبدء البث"));
            document.getElementById('view-count').innerText = Math.floor(Math.random() * 150) + 50;
        }

        // 6. فلترة فورية بالبحث داخل القسم المفتوح حالياً
        function searchChannels() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allFetchedChannels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        // بدء التشغيل التلقائي لجلب البيانات عند فتح الصفحة
        fetchCategories();
    </script>
</body>
</html>
