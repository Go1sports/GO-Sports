            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-top: 5px;
        }

        .badge {
            background-color: rgba(0, 242, 195, 0.05);
            color: #00f2c3;
            border: 1px solid rgba(0, 242, 195, 0.15);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .title-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .title-area h1 {
            color: #00f2c3;
            font-size: 26px;
            margin: 0;
            font-weight: 800;
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #5b21b6, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .subtitle {
            color: #71878b;
            font-size: 12px;
            margin-top: 6px;
        }

        .welcome-box {
            background: linear-gradient(to bottom, #032a31, #021e23);
            border: 1px solid rgba(0, 242, 195, 0.15);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .welcome-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00f2c3, #00a3e0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0, 242, 195, 0.2);
        }

        .welcome-icon svg {
            width: 32px;
            height: 32px;
            fill: #021e23;
        }

        .welcome-box h3 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }

        .welcome-box p {
            margin: 0;
            font-size: 12px;
            color: #71878b;
            line-height: 1.6;
            max-width: 260px;
        }

        .welcome-status {
            font-size: 11px;
            color: #00f2c3;
            margin-top: 4px;
            font-weight: bold;
        }

        .player-box {
            background-color: #032a31;
            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 8px;
            position: relative;
            z-index: 10;
            display: none;
        }

        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        :root {
            --plyr-color-main: #00f2c3;
            --plyr-video-control-color: #ffffff;
            --plyr-video-controls-background: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.75));
        }
        
        .plyr {
            border-radius: 12px;
        }

        .servers-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 0 4px;
        }

        .server-btn {
            flex: 1;
            min-width: 75px;
            background-color: rgba(113, 135, 139, 0.1);
            color: #71878b;
            border: 1px solid rgba(113, 135, 139, 0.2);
            padding: 6px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .server-btn.active {
            background-color: rgba(0, 242, 195, 0.15);
            color: #00f2c3;
            border-color: #00f2c3;
        }

        .player-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 4px;
        }

        .views-tag {
            background-color: rgba(0, 242, 195, 0.1);
            color: #00f2c3;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 50px;
            font-weight: bold;
        }

        .channel-info h2 {
            font-size: 14px;
            margin: 0;
            color: #ffffff;
        }

        .telegram-block {
            position: relative;
            z-index: 20;
            width: 100%;
        }

        .telegram-banner {
            background-color: #032a31;
            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: background-color 0.2s ease;
        }

        .telegram-banner:hover {
            background-color: #04353e;
        }

            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tg-icon-wrapper {
            width: 44px;
            height: 44px;
            background-color: #24A1DE;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tg-icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .tg-text-wrapper {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .tg-top-label {
            color: #24A1DE;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .tg-main-text {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .tg-btn-join {
            background-color: #00a3e0;
            border: none;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 163, 224, 0.3);
        }

        .categories-block {
            position: relative;
            z-index: 30;
            width: 100%;
        }

        .categories-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .categories-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background-color: transparent;
            color: #71878b;
            border: 1px solid rgba(113, 135, 139, 0.2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            background-color: #00f2c3;
            color: #021e23;
            border-color: #00f2c3;
        }

        .search-block {
            position: relative;
            z-index: 40;
            width: 100%;
        }

            width: 100%;
            background-color: rgba(3, 42, 49, 0.4);
            border: 1px solid rgba(113, 135, 139, 0.2);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            color: white;
            text-align: right;
            font-size: 13px;
            outline: none;
        }

        .channels-section {
            position: relative;
            z-index: 50;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;

            font-size: 14px;
            margin: 0;
        }

            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }

            cursor: pointer;

            top: 10px;
            left: 12px;

            font-weight: bold;

        let currentChannel = null; 
        let currentServer = 1; 
        let hls = null;

        const player = new Plyr('#live-player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
            settings: ['quality', 'speed'],
            i18n: {
                quality: 'الجودة',
                speed: 'السرعة',
                normal: 'طبيعي'
            }
        });

        player.on('enterfullscreen', () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(err => {
                    console.log("قفل التدوير يتطلب تفاعل المستخدم أو متصفح متوافق:", err);
                });
            }
        });

        player.on('exitfullscreen', () => {
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        });

        function renderChannels(channelsToRender) {
            const gridContainer = document.getElementById('channels-grid');
            gridContainer.innerHTML = '';
            document.getElementById('channel-count').innerText = channelsToRender.length;

            channelsToRender.forEach(channel => {
                const card = document.createElement('div');
                card.className = "channel-card";
                card.onclick = function() { playChannel(channel.id); };
                card.innerHTML = `
                    <div class="fav-star">☆</div>
                    <div class="card-info">
                        <span>${channel.tag}</span>
                        <p>${channel.name}</p>
                    </div>
                    <div class="play-button-circle">▶</div>
                `;
                gridContainer.appendChild(card);
            });
        }

        function playChannel(id) {
            const channel = channels.find(c => c.id === id);
            if (channel) {
                currentChannel = channel;
                
                document.getElementById('welcome-box').style.display = 'none';
                document.getElementById('player-box').style.display = 'block';
                document.getElementById('current-channel-title').innerText = channel.name;
                
                const srv3Btn = document.getElementById('btn-srv3');
                const srv4Btn = document.getElementById('btn-srv4');
                
                if (channel.category === 'all') {
                    srv3Btn.style.display = 'block';
                    srv4Btn.style.display = 'block';
                } else {
                    srv3Btn.style.display = 'none';
                    srv4Btn.style.display = 'none';
                    if (currentServer > 2) {
                        currentServer = 1;
                        setActiveServerButton(1);
                    }
                }

                let streamUrl = "";
                if (currentServer === 1) streamUrl = channel.url;
                else if (currentServer === 2) streamUrl = channel.url2;
                else if (currentServer === 3) streamUrl = channel.url3;
                else if (currentServer === 4) streamUrl = channel.url4;
                
                if (!streamUrl || streamUrl.trim() === "") {
                    stopAndClearPlayer();
                    return;
                }
                
                loadStream(streamUrl);
            }
        }

        function changeServer(serverNumber) {
            currentServer = serverNumber;
            setActiveServerButton(serverNumber);
            
            if (currentChannel) {
                playChannel(currentChannel.id);
            }
        }

        function setActiveServerButton(serverNumber) {
            document.getElementById('btn-srv1').classList.toggle('active', serverNumber === 1);
            document.getElementById('btn-srv2').classList.toggle('active', serverNumber === 2);
            document.getElementById('btn-srv3').classList.toggle('active', serverNumber === 3);
            document.getElementById('btn-srv4').classList.toggle('active', serverNumber === 4);
        }

        function stopAndClearPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            const videoElement = document.getElementById('live-player');
            player.stop();
            videoElement.src = "";
            videoElement.load();
            document.getElementById('view-count').innerText = "0";
            console.log("السيرفر فارغ تماماً لهذه القناة، تم إيقاف المشغل.");
        }

        function loadStream(url) {
            const videoElement = document.getElementById('live-player');
            const isM3U8 = url.includes('m3u8') || url.includes('stream?url=');

            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (isM3U8) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                        const availableQualities = hls.levels.map(l => l.height);
                        availableQualities.unshift(0); 
                        
                        player.config.quality = {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (hlsQuality) => {
                                if (hlsQuality === 0) {
                                    hls.currentLevel = -1; 
                                } else {
                                    hls.currentLevel = hls.levels.findIndex(l => l.height === hlsQuality);
                                }
                            }
                        };
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } else {
                videoElement.src = url;
            }

            player.play().catch(e => console.log("بانتظار تفاعل المستخدم لبدء البث"));
            document.getElementById('view-count').innerText = Math.floor(Math.random() * 150) + 50;
        }

        function searchChannels() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        function filterCategory(category, buttonElement) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const sectionTitle = document.getElementById('section-title');
            
            if (category === 'all') {
                sectionTitle.innerText = "القنوات البنفسجية IQ";
            } else if (category === 'alkass') {
                sectionTitle.innerText = "قنوات ألكاس";
            } else if (category === 'alwan') {
                sectionTitle.innerText = "قنوات ألوان";
            } else if (category === 'mbc') {
                sectionTitle.innerText = "قنوات MBC";
            } else if (category === 'worldcup') {
                sectionTitle.innerText = "قنوات كأس العالم";
            } else if (category === 'thamanya') {
                sectionTitle.innerText = "قنوات ثمانية";
            }

            const filtered = channels.filter(c => c.category === category);
            renderChannels(filtered);
        }

        filterCategory('all', document.querySelector('.tab-btn'));
    </script>
