<html lang="ar" dir="rtl">

            padding: 12px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {

            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-top: 5px;
        }

        .badge {
            background-color: rgba(0, 242, 195, 0.05);
            color: #00f2c3;
            border: 1px solid rgba(0, 242, 195, 0.15);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .title-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .title-area h1 {
            color: #00f2c3;
            font-size: 26px;
            margin: 0;
            font-weight: 800;
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #5b21b6, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .subtitle {
            color: #71878b;
            font-size: 12px;
            margin-top: 6px;
        }

            background: linear-gradient(to bottom, #032a31, #021e23);

            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .welcome-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00f2c3, #00a3e0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0, 242, 195, 0.2);
        }

        .welcome-icon svg {
            width: 32px;
            height: 32px;
            fill: #021e23;
        }

        .welcome-box h3 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }

        .welcome-box p {
            margin: 0;
            font-size: 12px;
            color: #71878b;
            line-height: 1.6;
            max-width: 260px;
        }

        .welcome-status {
            font-size: 11px;
            color: #00f2c3;
            margin-top: 4px;
            font-weight: bold;
        }

            border: 1px solid rgba(0, 242, 195, 0.1);
            border-radius: 16px;
            padding: 8px;
            position: relative;
            z-index: 10;
            display: none;
        }

        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        :root {
            --plyr-color-main: #00f2c3;
            --plyr-video-control-color: #ffffff;
            --plyr-video-controls-background: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.75));
        }
        
        .plyr {
            border-radius: 12px;
        }

            margin-top: 10px;
            padding: 0 4px;
        }

            font-size: 12px;
            font-weight: bold;
            cursor: pointer;

        .server-btn.active {

            color: #00f2c3;
            border-color: #00f2c3;
        }

        .player-details {

            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 4px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;

        }

        .telegram-banner:hover {
            background-color: #04353e;
        }

        .tg-left-side {

            align-items: center;
            gap: 12px;
        }

        .tg-icon-wrapper {
            width: 44px;
            height: 44px;
            background-color: #24A1DE;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tg-icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .tg-text-wrapper {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .tg-top-label {
            color: #24A1DE;
            font-size: 10px;
            font-weight: bold;

        .tg-main-text {

            font-weight: bold;

            font-weight: bold;

            z-index: 30;
            width: 100%;
        }

        .categories-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .categories-tabs::-webkit-scrollbar {
            display: none;
        }

            color: #71878b;

            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;

        .tab-btn.active {
            background-color: #00f2c3;
            color: #021e23;
            border-color: #00f2c3;
        }

            z-index: 40;

            color: white;
            text-align: right;
            font-size: 13px;

            position: relative;
            z-index: 50;
            width: 100%;

            justify-content: space-between;
            align-items: center;

            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;

            top: 10px;
            left: 12px;
            color: #71878b;
            font-size: 13px;

            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;

            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: bold;
        }

</head>

        function renderChannels(channelsToRender) {
            const gridContainer = document.getElementById('channels-grid');
            gridContainer.innerHTML = '';
            document.getElementById('channel-count').innerText = channelsToRender.length;

            channelsToRender.forEach(channel => {
                const card = document.createElement('div');
                card.className = "channel-card";
                card.onclick = function() { playChannel(channel.id); };
                card.innerHTML = `
                    <div class="fav-star">☆</div>
                    <div class="card-info">
                        <span>${channel.tag}</span>
                        <p>${channel.name}</p>
                    </div>
                    <div class="play-button-circle">▶</div>

                gridContainer.appendChild(card);
            });
        }

            if (channel) {
                currentChannel = channel;
                
                document.getElementById('welcome-box').style.display = 'none';
                document.getElementById('player-box').style.display = 'block';
                
                document.getElementById('current-channel-title').innerText = channel.name;
                
                const streamUrl = currentServer === 1 ? channel.url : (channel.url2 || channel.url);
                loadStream(streamUrl);
            }
        }

        function changeServer(serverNumber) {
            currentServer = serverNumber;
            
            document.getElementById('btn-srv1').classList.toggle('active', serverNumber === 1);
            document.getElementById('btn-srv2').classList.toggle('active', serverNumber === 2);
            
            if (currentChannel) {
                playChannel(currentChannel.id);
            }
        }

        function loadStream(url) {
            const videoElement = document.getElementById('live-player');
            const isM3U8 = url.includes('m3u8');

            if (hls) {
                hls.destroy();
            }

            if (isM3U8) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                        const availableQualities = hls.levels.map(l => l.height);
                        availableQualities.unshift(0); 
                        
                        player.config.quality = {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (hlsQuality) => {
                                if (hlsQuality === 0) {
                                    hls.currentLevel = -1; 
                                } else {
                                    hls.currentLevel = hls.levels.findIndex(l => l.height === hlsQuality);
                                }
                            }
                        };
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } else {
                videoElement.src = url;
            }

            player.play().catch(e => console.log("بانتظار تفاعل المستخدم لبدء البث"));
            document.getElementById('view-count').innerText = Math.floor(Math.random() * 150) + 50;
        }

        function searchChannels() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        function filterCategory(category, buttonElement) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const sectionTitle = document.getElementById('section-title');
            
            if (category === 'all') {
                sectionTitle.innerText = "القنوات البنفسجية IQ";
            } else if (category === 'alkass') {
                sectionTitle.innerText = "قنوات ألكاس";
            } else if (category === 'alwan') {
                sectionTitle.innerText = "قنوات ألوان";
            } else if (category === 'worldcup') {
                sectionTitle.innerText = "قنوات كأس العالم";
            }

            const filtered = channels.filter(c => c.category === category);
            renderChannels(filtered);
        }

        // تهيئة الفلتر الافتراضي عند تحميل الصفحة ليظهر القسم الأول
        filterCategory('all', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
